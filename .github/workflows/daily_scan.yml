name: Content Radar — סריקה יומית

on:
  schedule:
    # רץ כל יום בשעה 07:00 שעון ישראל (05:00 UTC בשעון קיץ)
    - cron: "0 5 * * *"
  workflow_dispatch:  # מאפשר הרצה ידנית דרך GitHub

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen items cache
        uses: actions/cache@v4
        with:
          path: seen_items.json
          key: seen-items-${{ github.run_id }}
          restore-keys: seen-items-

      - name: Run scraper
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python scraper.py

      - name: Save seen items
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_items.json
          key: seen-items-${{ github.run_id }}
